#It starts:
# -the Spring Boot application
# -PostgreSQL database
# -pgAdmin UI
name: binance-market-data-ingestion

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: binance-market-data-ingestor-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: market_data_ingestion
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_password #For local development only. Use a secret or environment variable in production.
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market-data-network

  postgres:
    image: postgres:16-alpine

    container_name: binance-market-data-ingestion-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: market_data_ingestion
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_password

    #Persist database data between container restarts.
    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d market_data_ingestion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - market-data-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: binance-market-data-ingestion-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market-data-network

volumes:
  postgres-data:
  pgadmin-data:

networks:
  market-data-network:
    driver: bridge
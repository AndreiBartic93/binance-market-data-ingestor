databaseChangeLog:
  - changeSet:
      id: BR-011-001-create-ingestion-watermarks-table
      author: andrei
      comments: Create ingestion watermarks table for tracking ingestion progress per subscription.
      changes:
        - createTable:
            tableName: ingestion_watermarks
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ingestion_watermarks
                    nullable: false

              - column:
                  name: market_data_subscription_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_ingestion_watermarks_subscription

              - column:
                  name: last_successful_open_time
                  type: TIMESTAMPTZ

              - column:
                  name: last_successful_close_time
                  type: TIMESTAMPTZ

              - column:
                  name: last_ingestion_run_id
                  type: BIGINT

              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMPTZ

  - changeSet:
      id: BR-011-002-add-ingestion-watermarks-foreign-key
      author: andrei
      comments: Link ingestion watermark to market data subscription.
      changes:
        - addForeignKeyConstraint:
            baseTableName: ingestion_watermarks
            baseColumnNames: market_data_subscription_id
            referencedTableName: market_data_subscriptions
            referencedColumnNames: id
            constraintName: fk_ingestion_watermarks_subscription

  - changeSet:
      id: BR-011-003-create-ingestion-watermarks-indexes
      author: andrei
      comments: Add indexes for querying ingestion watermarks.
      changes:
        - createIndex:
            tableName: ingestion_watermarks
            indexName: idx_ingestion_watermarks_last_successful_open_time
            columns:
              - column:
                  name: last_successful_open_time

        - createIndex:
            tableName: ingestion_watermarks
            indexName: idx_ingestion_watermarks_last_successful_close_time
            columns:
              - column:
                  name: last_successful_close_time

  - changeSet:
      id: BR-011-004-backfill-watermarks-for-existing-subscriptions
      author: andrei
      comments: Create empty watermarks for existing market data subscriptions.
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            stripComments: true
            sql: |
              INSERT INTO ingestion_watermarks (
                  market_data_subscription_id,
                  last_successful_open_time,
                  last_successful_close_time,
                  last_ingestion_run_id,
                  created_at,
                  updated_at
              )
              SELECT
                  mds.id,
                  null,
                  null,
                  null,
                  now(),
                  null
              FROM market_data_subscriptions mds
              ON CONFLICT (market_data_subscription_id) DO NOTHING;
  - include:
      file: db/changelog/changes/004-create-assets-table.yaml
  - include:
      file: db/changelog/changes/005-create-trading-pairs-table.yaml
  - include:
      file: db/changelog/changes/006-create-timeframes-table.yaml
  - include:
      file: db/changelog/changes/007-seed-binance-market-reference-data.yaml
  - include:
      file: db/changelog/changes/008-create-market-data-subscriptions-table.yaml
  - include:
      file: db/changelog/changes/009-create-ingestion-watermarks-table.yaml
  - include:
      file: db/changelog/changes/010-create-ingestion-profiles-table.yaml
  - include:
      file: db/changelog/changes/011-create-ingestion-profile-subscriptions-table.yaml
  - include:
      file: db/changelog/changes/012-create-ingestion-runs-table.yaml
  - include:
